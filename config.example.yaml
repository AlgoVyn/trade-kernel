# trade-kernel configuration. Copy to trade-kernel.yaml and edit.
#
# Alpaca API credentials can be provided two ways (environment overrides
# the file if both are set):
#   1. Here, as api_key_id / api_secret_key below.
#   2. As env vars: APCA_API_KEY_ID / APCA_API_SECRET_KEY.
# SECURITY: if you put keys in this file, keep it out of git (it's in
# .gitignore as trade-kernel.yaml) and restrict its permissions to 0600.
# Prefer the env vars or a secret manager when possible.
api_key_id: ""
api_secret_key: ""
#
# Env var TRADE_KERNEL_LIVE overrides paper mode regardless of the file:
#   TRADE_KERNEL_LIVE=1  force live (still needs live_trading_acknowledged: true)
#   TRADE_KERNEL_LIVE=0  force paper

# Paper trading is the default. For live trading you must set BOTH
# paper: false and live_trading_acknowledged: true.
paper: true
live_trading_acknowledged: false

default_symbol: AAPL

# Selectable with keys 1-4. First entry is the default.
size_presets: [100, 250, 500, 1000]

# Ask for y/n confirmation before every order (shows the converted
# limit price in extended sessions). Session class is pinned at confirm
# so a boundary during y/n cannot flip market↔limit.
confirm_orders: true

orders:
  # Regular-hours time-in-force for hotkey market/limit and :buy/:sell.
  # Extended sessions always use day + extended_hours=true.
  # Flatten/panic always use day TIF (IOC can leave residual size).
  regular_tif: day          # day | ioc

limits:
  max_order_qty: 1000       # reject orders larger than this
  max_position_qty: 5000    # reject if position + same-side working + new would grow |exposure|
                            # opposite-side resting is not a credit and not a gross cap
                            # (long + resting sells can still stack past this in notional)
  debounce_ms: 300          # duplicate-order debounce (flatten/panic skip this)

extended_hours:
  slippage_bps: 25          # aggressive-limit offset (basis points)
  quote_stale_ms: 3000      # NBBO older than this -> price off last trade + warn
                            # (flatten/panic may use last trade up to ~5m on quiet tape)

indicators:
  ema_period: 9             # fast EMA period
  ema2_period: 20           # slow EMA period
  vwap_anchor: session      # "session" resets each session; "day" resets at 20:00 ET

chart:
  # Initial resolution: built-ins 1s|5s|15s|1m|5m|15m|1h|1d, or a custom
  # duration like 2m, 3m, 30s, 4h. Change at runtime with :tf 2m
  timeframe: 1m
  # Optional max bars painted (CPU/history cap). Omit or 0 → fill full width.
  # Positive N caps at min(width-fit, N); below width-fit leaves a blank left
  # gutter. Prefer [ / ] or :focus for intentional cropping without a hard cap.
  # bars_visible: 0
  session_shading: true
  tick_ms: 50               # base UI refresh (16–500). Short TFs speed up to 33ms
                            # when base is higher; panned/closed slow to ≥100ms.

# Optional keybinding overrides (action -> key). Actions:
# buy, sell, add, reduce, flatten, cancel, panic, cmdline,
# cycle_tf, cycle_tf_back, pan_left, pan_right, cycle_indicators,
# quit, quit_force
# Legacy aliases (same as cancel/panic — symbol-scoped only):
# cancel_all, panic_all
# keys:
#   buy: B
#   panic: X
